<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>radio</title>
</head>
<body>
    <form action="/server">
        <div>
            <input type="radio" name="fruit" id="apple" value="apple">
            <label for="apple">Apple</label>
            <input type="radio" name="fruit" id="banana" value="banana">
            <label for="banana">Banana</label>
            <input type="radio" name="fruit" id="mango" value="mango">
            <label for="mango">Mango</label>
            <input type="radio" name="fruit" id="orange" value="orange">
            <label for="orange">Orange</label>
        </div>
        <div>
            Choose your subject
            <input type="checkbox" name="sub" id="math" value="math">
            <label for="math">Math</label>
            <input type="checkbox" name="sub" id="eng" value="eng">
            <label for="eng">English</label>
            <input type="checkbox" name="sub" id="sci" value="sci">
            <label for="sci">Science</label>
            <input type="checkbox" name="sub" id="his" value="his">
            <label for="his">History</label>
        </div>
        <button>submit</button>
    </form>
</body>
</html>
