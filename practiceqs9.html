<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice Question</title>
</head>
<body>
    <h3>Registration Form</h3>
    <form action="/server">
        <div>
            <input type="text" placeholder="First name" name="fn">
            <input type="text" placeholder="Last name" name="ln">
        </div>
        <div>
            <label for="gender">Please select your gender</label>
            <select name="gender" id="gender">
                <option>Select any of them</option>
                <option value="m">Male</option>
                <option value="f">Female</option>
                <option value="o">Other</option>
            </select>
        </div>
        <div>
                Do you agree all terms of service?
                <input type="checkbox" id="t&c" name="t&c">
            <label for="t&c">Yes, I agree</label>
        </div>
        <button>Register</button>
    </form>
</body>
</html>
