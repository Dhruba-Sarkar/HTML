<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>range</title>
</head>
<body>
    <form action="/server">
        <label for="vol">Select your volume</label>
        <input type="range" id="vol" name="volume" min="0" max="100" step="10" value="50">   
        <button>Submit</button>
    </form>
</body>
</html>
